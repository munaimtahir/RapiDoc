name: Manual Build Debug APK

on:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build Debug APK
        env:
          # Safety: if your repo has org.gradle.java.home pinned to a sandbox path,
          # this ensures Gradle still uses the Actions JDK.
          ORG_GRADLE_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          ./gradlew :app:clean :app:assembleDebug --no-daemon --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RapiDocUSG-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk