name: Manual E2E Playwright Tests

# ──────────────────────────────────────────────────────────────────────────────
# IMPORTANT: This workflow is MANUAL-TRIGGER ONLY (workflow_dispatch).
# It will NOT run on push, pull_request, schedule, or any automatic event.
# Trigger it from: GitHub → Actions → "Manual E2E Playwright Tests" → Run workflow
# ──────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      avd_api_level:
        description: "Android API level for the emulator (default: 33)"
        required: false
        default: "33"
      emulator_target:
        description: "Emulator target: default | google_apis (default: google_apis)"
        required: false
        default: "google_apis"

jobs:
  e2e-playwright:
    name: E2E Playwright Suite (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (required for Gradle + Android SDK) ───────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 3. Gradle cache ───────────────────────────────────────────────────
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # ── 4. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "system-images;android-${{ inputs.avd_api_level }};${{ inputs.emulator_target }};x86_64" \
            "emulator"

      # ── 5. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            :app:clean :app:assembleDebug \
            --no-daemon --console=plain

      # ── 6. Node.js + Playwright ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package.json

      - name: Install Playwright and dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # ── 7. KVM for hardware acceleration ─────────────────────────────────
      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 8. Create and start Android emulator ──────────────────────────────
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name "rapiddoc_avd" \
            --package "system-images;android-${{ inputs.avd_api_level }};${{ inputs.emulator_target }};x86_64" \
            --device "pixel_6" \
            --force

      - name: Start Android emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator \
            -avd rapiddoc_avd \
            -no-audio \
            -no-window \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -no-boot-anim \
            > /tmp/emulator.log 2>&1 &
          echo "Emulator PID: $!"

      - name: Wait for emulator to boot
        run: |
          adb wait-for-device
          # Poll boot completion property
          for i in $(seq 1 60); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Boot attempt $i: sys.boot_completed=$BOOT"
            if [ "$BOOT" = "1" ]; then
              echo "Emulator is fully booted."
              break
            fi
            sleep 5
          done
          # Dismiss any lock screen
          adb shell input keyevent 82 || true
          sleep 3

      # ── 9. Install APK on the emulator ────────────────────────────────────
      - name: Install APK on emulator
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          echo "Installing: $APK_PATH"
          adb install -r "$APK_PATH"
          echo "APK installed successfully."

      # ── 10. Run Playwright e2e tests ──────────────────────────────────────
      - name: Run Playwright e2e tests
        working-directory: e2e
        run: |
          npx playwright test \
            --reporter=html \
            --output=test-results
        env:
          # Ensure ADB is on PATH for the Playwright Android API
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 11. Upload artefacts ──────────────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test results (traces, videos, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 30

      - name: Upload emulator log (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log
          path: /tmp/emulator.log
          retention-days: 14
